version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: d2c
      POSTGRES_PASSWORD: d2c_secret
      POSTGRES_DB: d2c_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U d2c -d d2c_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    command: node dist/server.js
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://d2c:d2c_secret@postgres:5432/d2c_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    command: node dist/worker.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://d2c:d2c_secret@postgres:5432/d2c_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
